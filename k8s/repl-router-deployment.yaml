apiVersion: apps/v1
kind: Deployment
metadata:
  name: repl-router
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: repl-router
  template:
    metadata:
      labels:
        app: repl-router
    spec:
      containers:
        - name: router
          image: nginx:alpine
          ports:
            - containerPort: 8080
            - containerPort: 3000
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            limits:
              cpu: "200m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "32Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: repl-router-config
---
apiVerion: v1
kind: ConfigMap
metadata:
  name: repl-router-config
  namespace: app
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8080;   # ws agent port
        listen 3000;   # preview port

        # extract replId from subdomain: repl-abc123.yourapp.com → abc123
        server_name ~^repl-(?<replid>.+)\.yourapp\.com$;

        location /ws {
          proxy_pass http://repl-${replid}-svc.repls.svc.cluster.local:8080;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_read_timeout 3600;
          proxy_send_timeout 3600;
        }

        location / {
          proxy_pass http://repl-${replid}-svc.repls.svc.cluster.local:3000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: repl-router
  namespace: app
spec:
  selector:
    app: repl-router
  ports:
    - name: agent
      port: 8080
      targetPort: 8080
    - name: preview
      port: 3000
      targetPort: 3000